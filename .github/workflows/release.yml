name: Release

on:
  push:
    branches: [main]
    paths:
      - CHANGELOG.md

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new version from CHANGELOG.md
        id: version
        run: |
          # Extract the latest version header: ## [x.y.z] - date
          version=$(grep -oP '(?<=^## \[)[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | head -1)
          if [ -z "$version" ]; then
            echo "No version found in CHANGELOG.md"
            exit 1
          fi
          tag="v${version}"
          # Check if tag already exists
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping release"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - if: steps.version.outputs.skip == 'false'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        if: steps.version.outputs.skip == 'false'
        run: go test ./...

      - name: Build binaries
        if: steps.version.outputs.skip == 'false'
        run: |
          LDFLAGS="-X github.com/xiangma9712/mcp2cli.version=${{ steps.version.outputs.tag }}"
          mkdir -p dist
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              output="dist/mcp2cli-runner-${GOOS}-${GOARCH}"
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$LDFLAGS" -o "$output" ./cmd/mcp2cli-runner
            done
          done

      - name: Extract release notes
        if: steps.version.outputs.skip == 'false'
        run: |
          version="${{ steps.version.outputs.version }}"
          awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release v${version}" > release_notes.md
          fi

      - name: Create tag and GitHub Release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" dist/* \
            --title "$tag" \
            --notes-file release_notes.md
